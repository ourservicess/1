<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Restroom | Luxury Dining</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0f0f0f;
    --text:#ffffff;
    --card:#1c1c1c;
    --accent:#e63946;
}

.light-mode{
    --bg:#f5f5f5;
    --text:#111;
    --card:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
.hidden{
    display:none;
}

body{
    background:var(--bg);
    color:var(--text);
    transition:0.3s ease;
}

/* NAVBAR */
nav{
    position:fixed;
    width:100%;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.4s;
    z-index:1000;
}

nav.scrolled{
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(10px);
}

nav h2{
    letter-spacing:2px;
}

nav ul{
    display:flex;
    gap:25px;
    list-style:none;
}

nav a{
    text-decoration:none;
    color:var(--text);
    font-weight:500;
}

.toggle{
    background:var(--accent);
    padding:6px 14px;
    border-radius:20px;
    cursor:pointer;
}

/* HERO */
header{
    height:100vh;
    background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
    url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5');
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

header h1{
    font-size:4rem;
}

.btn{
    margin-top:20px;
    padding:12px 28px;
    border:none;
    background:var(--accent);
    color:white;
    cursor:pointer;
    border-radius:8px;
}

section{
    padding:80px 8%;
}
body {
    display: flex;
    flex-direction: column;
    min-height: 100vh; /* full viewport height */
}

section, header {
    flex-shrink: 0;
}

footer {
    margin-top: auto; /* pushes footer to bottom */
}

.section-title{
    text-align:center;
    font-size:2.5rem;
    margin-bottom:40px;
}

/* MENU */
.menu{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

.menu-item{
    background:var(--card);
    padding:20px;
    border-radius:15px;
    transition:0.3s;
}

.menu-item:hover{
    transform:translateY(-8px);
}

/* GALLERY */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    border-radius:12px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* FORM */
form{
    max-width:500px;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:15px;
}

input, textarea{
    padding:12px;
    border-radius:8px;
    border:none;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px 20px;
    border-radius:50px;
    text-decoration:none;
    font-weight:600;
}

footer{
    text-align:center;
    padding:20px;
    opacity:0.7;
}

/* ===== MOBILE RESPONSIVE FIX ===== */
@media (max-width: 768px) {

    nav {
        padding: 15px 5%;
    }

    nav h2 {
        font-size: 1.2rem;
    }

    nav ul {
        gap: 12px;
    }

    nav a {
        font-size: 14px;
    }

    header h1 {
        font-size: 2rem;
        padding: 0 10px;
    }

    .section-title {
        font-size: 1.8rem;
    }

    .btn {
        padding: 10px 18px;
        font-size: 14px;
    }

    .menu {
        grid-template-columns: 1fr;
    }

    .gallery {
        grid-template-columns: 1fr;
    }

    section {
        padding: 60px 5%;
    }

    input, textarea {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<nav id="navbar">
    <h2>The Restroom</h2>
    <ul id="navLinks">
        <li><a href ="#menu">Menu</a></li>
        <li><a href="javascript:void(0)"onclick="showsection()">Gallery</a></li>
        <li><a href="#reservation">Reserve</a></li>
    </ul>
    <div class="toggle" onclick="toggleMode()">Mode</div>
</nav>

<header>
    <h1>Luxury Fine Dining Experience</h1>
    <button class="btn" onclick="document.getElementById('menu').scrollIntoView({behavior:'smooth'})">
        Explore Menu
    </button>
</header>

<section id="menu">
    <h2 class="section-title">Complete Food Menu</h2>

    <div style="text-align:center;margin-bottom:20px;">
        <input type="text" id="searchInput" placeholder="Search dishes..." style="width:250px;">
    </div>

    <div style="text-align:center;margin-bottom:30px;">
        <button class="btn" onclick="filterCategory('All')">All</button>
        <button class="btn" onclick="filterCategory('Punjabi')">Punjabi</button>
        <button class="btn" onclick="filterCategory('Chinese')">Chinese</button>
        <button class="btn" onclick="filterCategory('South Indian')">South Indian</button>
        <button class="btn" onclick="filterCategory('Chaat')">Chaat</button>
        <button class="btn" onclick="filterCategory('Desserts')">Desserts</button>
        <button class="btn" onclick="filterCategory('Beverages')">Beverages</button>
        <button class="btn" onclick="filterCategory('Soft Drinks')">Soft Drinks</button>
    </div>

    <div class="menu" id="menuContainer"></div>
</section>

<!-- <section id="gallerysection"class="hidden">
    <h2 class="section-title">Gallery</h2>
    <div class="gallery"> -->
        <section id="gallerysection" class="hidden">
    <h2 class="section-title">Gallery</h2>

    <!-- ADD THIS BACK BUTTON HERE -->
    <div style="text-align:center; margin-bottom:30px;">
        <button class="btn"onclick="goBack()">← Back to Home</button>
    </div>

    <div class="gallery">
        <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
        <img src="https://images.unsplash.com/photo-1551218808-94e220e084d2">
        <img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d">
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
    </div>
</section>

<section id="reservation">
    <h2 class="section-title">Reserve a Table</h2>
    <form action="mailto:yourrestaurant@email.com" method="post" enctype="text/plain">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <input type="date" required>
        <input type="time" required>
        <textarea placeholder="Special Request"></textarea>
        <button class="btn">Book Now</button>
    </form>
</section>

<a class="whatsapp" href="https://wa.me/9313519783" target="_blank">
    WhatsApp Booking
</a>

<footer>
    © 2026 The Restroom | Premium Dining
</footer>


<script>

/* Navbar Scroll Effect */
window.addEventListener("scroll",function(){
    document.getElementById("navbar")
    .classList.toggle("scrolled",window.scrollY>50);
});

/* Dark Mode */
function toggleMode(){
    document.body.classList.toggle("light-mode");
}

/* MENU SYSTEM */
const menuItems=[];
let currentCategory="";

/* Categories */
const categories=[
{ name:"Punjabi", items:["Punjabi Thali","Paneer Butter Masala","Dal Makhani","Chole Bhature","Amritsari Kulcha"]},
{ name:"Chinese", items:["Hakka Noodles","Manchurian","Spring Roll","Chilli Paneer","Schezwan Rice"]},
{ name:"South Indian", items:["Masala Dosa","Idli","Vada","Uttapam","Sambar Rice"]},
{ name:"Chaat", items:["Pani Puri","Bhel Puri","Sev Puri","Dahi Puri","Aloo Tikki"]},
{ name:"Desserts", items:["Chocolate Cake","Red Velvet Cake","Brownie","Gulab Jamun","Rasmalai"]},
{ name:"Beverages", items:["Cold Coffee","Lassi","Milkshake","Mojito","Fresh Lime Soda"]},
{ name:"Soft Drinks", items:["Coca Cola","Pepsi","Sprite","Fanta","Limca"]}
];

/* Generate 250+ Items */
categories.forEach(cat=>{
    for(let i=1;i<=8;i++){
        cat.items.forEach(item=>{
            menuItems.push({
                name:item+" Special "+i,
                category:cat.name,
                description:"Authentic "+cat.name+" flavor crafted with premium ingredients."
            });
        });
    }
});

const container=document.getElementById("menuContainer");
const searchInput=document.getElementById("searchInput");

//   function showsection() {

//     // Hide menu and reservation
//     document.getElementById("menu").classList.add("hidden");
//     document.getElementById("reservation").classList.add("hidden");

//     // Show gallery
//     document.getElementById("gallerysection").classList.remove("hidden");

//     // Scroll to top
// /
function showsection() {

    // Hide page sections
    document.querySelector("header").classList.add("hidden");
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("reservation").classList.add("hidden");

    // Show gallery
    document.getElementById("gallerysection").classList.remove("hidden");

    // Hide navbar links
    document.getElementById("navLinks").classList.add("hidden");

    window.scrollTo({ top: 0, behavior: "smooth" });
}


function goBack() {

    // Show page sections
    document.querySelector("header").classList.remove("hidden");
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("reservation").classList.remove("hidden");

    // Hide gallery
    document.getElementById("gallerysection").classList.add("hidden");

    // Show navbar links again
    document.getElementById("navLinks").classList.remove("hidden");

    window.scrollTo({ top: 0, behavior: "smooth" });
}
/* Display Menu */
function displayMenu(items){
    container.innerHTML="";
    if(items.length===0){
        container.innerHTML="<p style='text-align:center;width:100%'>Select a category to view items</p>";
        return;
    }

    items.forEach(item=>{
        container.innerHTML+=`
        <div class="menu-item">
            <h3>${item.name}</h3>
            <p>${item.description}</p>
            <small>${item.category}</small>
        </div>`;
    });
}

/* Filter by Category */
function filterCategory(category){
    currentCategory=category;
    searchInput.value="";
    const filtered=menuItems.filter(item=>item.category===category);
    displayMenu(filtered);
}

/* Search inside selected category */
searchInput.addEventListener("keyup",function(){
    const value=this.value.toLowerCase();

    if(!currentCategory){
        displayMenu([]);
        return;
    }

    const filtered=menuItems.filter(item=>
        item.category===currentCategory &&
        item.name.toLowerCase().includes(value)
    );

    displayMenu(filtered);
});

/* Load empty initially */
displayMenu([]);

</script>

</body>
</html>
